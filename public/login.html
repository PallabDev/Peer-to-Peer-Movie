<!DOCTYPE html>
<html lang="en" class="h-full bg-neutral-950 text-neutral-100 selection:bg-rose-500 selection:text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Together | Log In</title>
  <meta name="description" content="Private P2P Screen Sharing and Live Chat application.">
  <link rel="stylesheet" href="/css/output.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>
<body class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8 bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(120,119,198,0.18),rgba(255,255,255,0))]">
  <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
    <div class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-tr from-rose-500 to-amber-500 text-white shadow-lg shadow-rose-500/20">
      <!-- Movie Camera Icon -->
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 20.25h12m-7.5-3v3m3-3v3m-10.125-3h17.25c.621 0 1.125-.504 1.125-1.125V4.875c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125z" />
      </svg>
    </div>
    <h1 class="mt-6 text-3xl font-bold tracking-tight text-white sm:text-4xl bg-clip-text text-transparent bg-gradient-to-r from-neutral-100 to-neutral-400">
      Watch Together
    </h1>
    <p class="mt-2 text-sm text-neutral-400">
      Private peer-to-peer screen sharing & theater
    </p>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-[420px]">
    <div class="bg-neutral-900/60 backdrop-blur-xl border border-neutral-800/80 px-8 py-10 shadow-2xl rounded-3xl sm:px-10">
      <!-- Error Message Box -->
      <div id="error-container" class="hidden mb-6 rounded-2xl bg-rose-500/10 border border-rose-500/20 p-4">
        <div class="flex">
          <div class="flex-shrink-0">
            <svg class="h-5 w-5 text-rose-400" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" />
            </svg>
          </div>
          <div class="ml-3">
            <h3 id="error-title" class="text-sm font-medium text-rose-300">Authentication Failed</h3>
            <div id="error-message" class="mt-1 text-xs text-rose-400 leading-relaxed"></div>
          </div>
        </div>
      </div>

      <!-- Info Message Box (e.g. Session Terminated) -->
      <div id="info-container" class="hidden mb-6 rounded-2xl bg-amber-500/10 border border-amber-500/20 p-4">
        <div class="flex">
          <div class="flex-shrink-0">
            <svg class="h-5 w-5 text-amber-400" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.53-1.516 2.53H3.72c-1.347 0-2.189-1.363-1.515-2.53l6.28-10.875zM10 5a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 5zm0 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" />
            </svg>
          </div>
          <div class="ml-3">
            <h3 id="info-title" class="text-sm font-medium text-amber-300">Session Status</h3>
            <div id="info-message" class="mt-1 text-xs text-amber-400 leading-relaxed"></div>
          </div>
        </div>
      </div>

      <form id="login-form" class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium leading-6 text-neutral-300">Email Address</label>
          <div class="mt-2">
            <input id="email" name="email" type="email" autocomplete="email" required 
              class="block w-full rounded-2xl border-0 bg-neutral-800/50 py-3 px-4 text-white shadow-sm ring-1 ring-inset ring-neutral-700/60 placeholder:text-neutral-500 focus:ring-2 focus:ring-inset focus:ring-rose-500 sm:text-sm sm:leading-6 transition">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium leading-6 text-neutral-300">Password</label>
          <div class="mt-2">
            <input id="password" name="password" type="password" autocomplete="current-password" required 
              class="block w-full rounded-2xl border-0 bg-neutral-800/50 py-3 px-4 text-white shadow-sm ring-1 ring-inset ring-neutral-700/60 placeholder:text-neutral-500 focus:ring-2 focus:ring-inset focus:ring-rose-500 sm:text-sm sm:leading-6 transition">
          </div>
        </div>

        <div class="pt-2">
          <button id="submit-btn" type="submit" 
            class="flex w-full justify-center rounded-2xl bg-gradient-to-r from-rose-500 to-amber-500 py-3 px-4 text-sm font-semibold leading-6 text-white shadow-lg hover:shadow-rose-500/25 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-rose-500 transition active:scale-[0.98]">
            Sign In
          </button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="/js/login.js"></script>
</body>
</html>
