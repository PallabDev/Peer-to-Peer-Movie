<!DOCTYPE html>
<html lang="en" class="h-full bg-neutral-950 text-neutral-100 selection:bg-rose-500 selection:text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Together | Lobby</title>
  <meta name="description" content="Watch Together Theater Lobby.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>
<body class="h-full flex flex-col bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(244,63,94,0.06),rgba(255,255,255,0))] overflow-y-auto">

  <!-- Navigation Header -->
  <header class="border-b border-neutral-900 bg-neutral-950/80 backdrop-blur-md sticky top-0 z-40 flex-shrink-0">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex h-16 items-center justify-between">
        
        <!-- Logo -->
        <div class="flex items-center space-x-3">
          <div class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-tr from-rose-500 to-amber-500 text-white shadow-md shadow-rose-500/10">
            <svg class="h-5 w-5 animate-pulse" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 20.25h12m-7.5-3v3m3-3v3m-10.125-3h17.25c.621 0 1.125-.504 1.125-1.125V4.875c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125z" />
            </svg>
          </div>
          <span class="font-bold text-lg text-white">Watch Together</span>
        </div>

        <!-- User Actions -->
        <div class="flex items-center space-x-6">
          <div class="flex items-center space-x-2">
            <span class="inline-block h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span id="nav-username" class="text-sm font-medium text-neutral-300">Loading user...</span>
          </div>
          <button id="logout-btn" class="text-sm font-medium text-rose-400 hover:text-rose-300 transition-colors">
            Log Out
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 space-y-8 flex-grow">
    
    <!-- Grid of Party Actions & Party List -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Left: Create Movie Party Form (1 Column) -->
      <section class="bg-neutral-900/50 border border-neutral-800/80 rounded-3xl p-6 backdrop-blur-xl h-fit">
        <h2 class="text-xl font-bold text-white mb-4">Create Watch Party</h2>
        <form id="create-party-form" class="space-y-4">
          <div>
            <label for="party-title" class="block text-sm font-medium text-neutral-300">Movie Title / Room Name</label>
            <div class="mt-2">
              <input id="party-title" name="title" type="text" required placeholder="e.g. Interstellar Watch Party"
                class="block w-full rounded-2xl border-0 bg-neutral-900 py-3 px-4 text-white shadow-sm ring-1 ring-inset ring-neutral-800 placeholder:text-neutral-500 focus:ring-2 focus:ring-inset focus:ring-rose-500 sm:text-sm transition">
            </div>
          </div>
          <button type="submit"
            class="flex w-full justify-center rounded-2xl bg-gradient-to-r from-rose-500 to-amber-500 py-3 px-4 text-sm font-bold text-white shadow-lg shadow-rose-500/20 hover:from-rose-600 hover:to-amber-600 transition active:scale-[0.98]">
            Start Party Room
          </button>
        </form>
      </section>

      <!-- Right: Active Watch Parties (2 Columns) -->
      <section class="lg:col-span-2 bg-neutral-900/50 border border-neutral-800/80 rounded-3xl p-6 backdrop-blur-xl flex flex-col min-h-[300px]">
        <div class="flex items-center justify-between mb-4 flex-shrink-0">
          <h2 class="text-xl font-bold text-white">Active Watch Parties</h2>
          <span id="active-parties-count" class="text-xs bg-rose-500/10 text-rose-400 px-2.5 py-1 rounded-full font-medium">0 active</span>
        </div>

        <!-- Party List -->
        <div id="parties-container" class="space-y-4 flex-grow overflow-y-auto max-h-[400px] pr-2">
          <!-- Loading state -->
          <div class="text-center py-12 text-neutral-500 text-sm select-none">
            Scanning for active parties...
          </div>
        </div>
      </section>
      
    </div>

    <!-- Admin Permissions Control Panel (Hidden from standard users) -->
    <section id="admin-panel" class="hidden bg-neutral-900/50 border border-neutral-800/80 rounded-3xl p-6 backdrop-blur-xl">
      <h2 class="text-xl font-bold text-white mb-4">User Access Administration</h2>
      
      <!-- Users Table -->
      <div class="overflow-x-auto rounded-2xl border border-neutral-800">
        <table class="min-w-full divide-y divide-neutral-800 text-left text-sm">
          <thead class="bg-neutral-950/60 font-semibold text-neutral-300">
            <tr>
              <th scope="col" class="px-6 py-4">User Email</th>
              <th scope="col" class="px-6 py-4">System Role</th>
              <th scope="col" class="px-6 py-4">Access Status</th>
              <th scope="col" class="px-6 py-4 text-right">Toggle Action</th>
            </tr>
          </thead>
          <tbody id="users-table-body" class="divide-y divide-neutral-800 bg-neutral-900/30">
            <!-- Populated via javascript -->
            <tr>
              <td colspan="4" class="text-center py-6 text-neutral-500 italic">Loading registered accounts...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="py-6 text-center text-[10px] text-neutral-600 select-none flex-shrink-0">
    Watch Together Private Movie Theater &copy; 2026.
  </footer>

  <script src="/js/lobby.js"></script>
</body>
</html>
