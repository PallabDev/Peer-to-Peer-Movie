<!DOCTYPE html>
<html lang="en" class="h-full bg-neutral-950 text-neutral-100 selection:bg-rose-500 selection:text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Together | Admin Panel</title>
  <meta name="description" content="Administrative control center for Watch Together.">
  <link rel="stylesheet" href="/css/output.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>
<body class="min-h-full flex flex-col bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(120,119,198,0.12),rgba(255,255,255,0))]">
  <!-- Top Navigation -->
  <nav class="border-b border-neutral-800/80 bg-neutral-900/40 backdrop-blur-md sticky top-0 z-50">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="flex h-16 justify-between items-center">
        <div class="flex items-center space-x-3">
          <div class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-tr from-rose-500 to-amber-500 text-white shadow-md">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.343 3.94c.09-.542.56-.94 1.11-.94h1.093c.55 0 1.02.398 1.11.94l.149.894c.07.424.384.764.78.93.398.164.855.142 1.205-.108l.737-.527a1.125 1.125 0 011.45.12l.773.774a1.125 1.125 0 01.12 1.45l-.527.737c-.25.35-.272.806-.107 1.204.165.397.505.71.93.78l.893.15c.543.09.94.56.94 1.11v1.094c0 .55-.398 1.02-.94 1.11l-.894.149c-.424.07-.764.383-.929.78-.164.398-.143.854.107 1.204l.527.738a1.125 1.125 0 01-.12 1.45l-.774.773a1.125 1.125 0 01-1.45.12l-.737-.527c-.35-.25-.806-.272-1.203-.107-.398.165-.71.505-.781.929l-.149.894c-.09.542-.56.94-1.11.94h-1.094c-.55 0-1.019-.398-1.11-.94l-.148-.894c-.071-.424-.384-.764-.781-.93-.398-.164-.854-.142-1.204.108l-.738.527a1.125 1.125 0 01-1.45-.12l-.773-.774a1.125 1.125 0 01-.12-1.45l.527-.737c.25-.35.272-.806.108-1.204-.165-.397-.505-.71-.93-.78l-.894-.15c-.542-.09-.94-.56-.94-1.11v-1.094c0-.55.398-1.02.94-1.11l.894-.149c.424-.07.765-.383.93-.78.165-.398.143-.854-.108-1.204l-.526-.738a1.125 1.125 0 01.12-1.45l.773-.773a1.125 1.125 0 011.45-.12l.737.527c.35.25.807.272 1.204.107.397-.165.71-.505.78-.929l.15-.894z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </div>
          <span class="font-bold text-lg text-white">WT Control Panel</span>
        </div>
        <div class="flex items-center space-x-4">
          <a href="/app.html" class="inline-flex items-center px-4 py-2 text-sm font-medium text-neutral-300 hover:text-white bg-neutral-800/40 hover:bg-neutral-800 rounded-xl transition border border-neutral-800">
            <svg class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
            </svg>
            Go to Theater
          </a>
          <button id="logout-btn" class="text-sm font-medium text-rose-400 hover:text-rose-300 transition">
            Log Out
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <main class="flex-grow mx-auto max-w-7xl w-full px-4 sm:px-6 lg:px-8 py-8">
    <div class="grid grid-cols-1 gap-8 lg:grid-cols-3">
      
      <!-- Create User Card (Left Column) -->
      <div class="lg:col-span-1">
        <div class="bg-neutral-900/50 border border-neutral-800/80 rounded-3xl p-6 backdrop-blur-xl sticky top-24">
          <h2 class="text-xl font-semibold text-white mb-6 flex items-center">
            <svg class="h-5 w-5 mr-2 text-rose-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
            </svg>
            Create New User
          </h2>
          
          <form id="create-user-form" class="space-y-5">
            <div>
              <label for="new-email" class="block text-sm font-medium text-neutral-300">Email Address</label>
              <input id="new-email" type="email" required 
                class="mt-2 block w-full rounded-2xl border-0 bg-neutral-850 py-2.5 px-4 text-white shadow-sm ring-1 ring-inset ring-neutral-700/60 placeholder:text-neutral-500 focus:ring-2 focus:ring-rose-500 sm:text-sm transition">
            </div>

            <div>
              <label for="new-password" class="block text-sm font-medium text-neutral-300">Password</label>
              <input id="new-password" type="password" required 
                class="mt-2 block w-full rounded-2xl border-0 bg-neutral-850 py-2.5 px-4 text-white shadow-sm ring-1 ring-inset ring-neutral-700/60 placeholder:text-neutral-500 focus:ring-2 focus:ring-rose-500 sm:text-sm transition">
            </div>

            <div>
              <label for="new-role" class="block text-sm font-medium text-neutral-300">Role</label>
              <select id="new-role" 
                class="mt-2 block w-full rounded-2xl border-0 bg-neutral-850 py-2.5 px-4 text-white shadow-sm ring-1 ring-inset ring-neutral-700/60 focus:ring-2 focus:ring-rose-500 sm:text-sm transition">
                <option value="user">User (Standard)</option>
                <option value="admin">Admin</option>
              </select>
            </div>

            <div class="relative flex items-start py-2">
              <div class="flex h-6 items-center">
                <input id="new-hasaccess" type="checkbox" checked
                  class="h-4 w-4 rounded-md border-neutral-700 bg-neutral-850 text-rose-500 focus:ring-rose-500/50">
              </div>
              <div class="ml-3 text-sm leading-6">
                <label for="new-hasaccess" class="font-medium text-neutral-300">Grant Immediate Access</label>
                <p class="text-neutral-500 text-xs">Allow this user to enter the room immediately.</p>
              </div>
            </div>

            <button type="submit" id="create-submit-btn"
              class="w-full inline-flex justify-center rounded-2xl bg-gradient-to-r from-rose-500 to-amber-500 py-3 px-4 text-sm font-semibold text-white shadow hover:shadow-rose-500/10 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-rose-500 transition active:scale-[0.98]">
              Create User
            </button>
          </form>
        </div>
      </div>

      <!-- Users List Card (Right Column) -->
      <div class="lg:col-span-2">
        <div class="bg-neutral-900/50 border border-neutral-800/80 rounded-3xl p-6 backdrop-blur-xl">
          <div class="sm:flex sm:items-center sm:justify-between mb-6">
            <div>
              <h2 class="text-xl font-semibold text-white flex items-center">
                <svg class="h-5 w-5 mr-2 text-amber-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.109A11.386 11.386 0 0110.089 21c-2.202 0-4.217-.63-5.919-1.717m5.919-1.283a11.365 11.365 0 01-5.919-1.717m5.919 1.283a11.963 11.963 0 005.919-1.717m0 0a11.962 11.962 0 003.414-2.658M8.25 10.5a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm10.5-2.25a1.875 1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zM16.5 13.5c-2.29 0-4.414-.806-6.089-2.146A5.435 5.435 0 005.25 9a5.435 5.435 0 00-5.161 2.354 4.125 4.125 0 007.533 2.493M15 13.5a5.486 5.486 0 01-2.161 2.354" />
                </svg>
                Registered Users
              </h2>
              <p class="mt-1 text-xs text-neutral-400">View and manage registered accounts.</p>
            </div>
            <!-- Search bar -->
            <div class="mt-3 sm:mt-0 sm:ml-4 w-full sm:max-w-xs">
              <div class="relative rounded-2xl shadow-sm">
                <input type="text" id="search-input" placeholder="Search users..."
                  class="block w-full rounded-2xl border-0 bg-neutral-850 py-2 px-4 text-white placeholder:text-neutral-500 ring-1 ring-inset ring-neutral-700/60 focus:ring-2 focus:ring-rose-500 text-sm transition">
              </div>
            </div>
          </div>

          <!-- Toast/Status Feedback inside dashboard -->
          <div id="admin-toast" class="hidden mb-4 rounded-xl p-3 text-sm transition-all duration-300"></div>

          <!-- Users Table -->
          <div class="mt-6 overflow-x-auto">
            <table class="min-w-full divide-y divide-neutral-800">
              <thead>
                <tr>
                  <th class="py-3 px-4 text-left text-xs font-semibold text-neutral-400 uppercase tracking-wider">Email</th>
                  <th class="py-3 px-4 text-left text-xs font-semibold text-neutral-400 uppercase tracking-wider">Role</th>
                  <th class="py-3 px-4 text-left text-xs font-semibold text-neutral-400 uppercase tracking-wider">Room Access</th>
                  <th class="py-3 px-4 text-right text-xs font-semibold text-neutral-400 uppercase tracking-wider">Actions</th>
                </tr>
              </thead>
              <tbody id="users-table-body" class="divide-y divide-neutral-800/60 bg-neutral-900/10">
                <!-- Injected via JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
      
    </div>
  </main>

  <!-- Password Reset Modal -->
  <div id="reset-modal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-neutral-950/80 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-neutral-900 border border-neutral-800 rounded-3xl w-full max-w-md p-6 shadow-2xl relative animate-in fade-in zoom-in duration-200">
      <h3 class="text-lg font-semibold text-white mb-2">Reset Password</h3>
      <p id="reset-modal-email" class="text-sm text-neutral-400 mb-6">Resetting password for user</p>
      
      <form id="reset-password-form" class="space-y-4">
        <input type="hidden" id="reset-user-id">
        <div>
          <label for="reset-new-password" class="block text-sm font-medium text-neutral-300">New Password</label>
          <input id="reset-new-password" type="password" required 
            class="mt-2 block w-full rounded-2xl border-0 bg-neutral-850 py-2.5 px-4 text-white shadow-sm ring-1 ring-inset ring-neutral-700/60 focus:ring-2 focus:ring-rose-500 sm:text-sm transition">
        </div>

        <div class="flex justify-end space-x-3 pt-4">
          <button type="button" id="close-modal-btn"
            class="px-4 py-2 rounded-2xl bg-neutral-800 text-neutral-300 hover:text-white hover:bg-neutral-750 text-sm font-medium transition">
            Cancel
          </button>
          <button type="submit"
            class="px-4 py-2 rounded-2xl bg-rose-500 hover:bg-rose-600 text-white text-sm font-medium transition">
            Save New Password
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
