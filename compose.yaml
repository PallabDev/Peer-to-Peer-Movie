services:
  app:
    build: .
    container_name: peer-to-peer-movie
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5678
      # Change this to a secure random string in production
      - SESSION_SECRET=a_very_secure_random_session_secret_123456
      - DUPLICATE_LOGIN_BEHAVIOR=disconnect
    ports:
      - "5678:5678"
    volumes:
      # Persists the SQLite database across container restarts/rebuilds
      - sqlite_data:/app/sqlite
    networks:
      - default
      - caddy_net
    labels:
      # Tells caddy-docker-proxy to route watch.pallabdev.in to this service
      caddy: watch.pallabdev.in
      caddy.reverse_proxy: "{{upstreams 5678}}"

networks:
  # The external network shared with the caddy-proxy container
  caddy_net:
    external: true

volumes:
  # Persistent volume for sqlite database
  sqlite_data:
