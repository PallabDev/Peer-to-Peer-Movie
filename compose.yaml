services:
  db:
    image: postgres:15-alpine
    container_name: watch-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=watch_together
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: watch-media
    restart: unless-stopped
    ports:
      - "1935:1935" # RTMP port (just in case they decide to use OBS)
      - "8889:8889" # WebRTC WHIP/WHEP port (for browser capture ingestion)
    environment:
      # Tell MediaMTX to advertise your domain for WebRTC ICE candidates (essential for NAT traversal)
      - MTX_WEBRTCICEHOSTS=watch.pallabdev.in
    networks:
      - default
      - caddy_net

  app:
    build: .
    container_name: watch-app
    restart: unless-stopped
    depends_on:
      - db
      - mediamtx
    ports:
      - "5678:5678"
    environment:
      - NODE_ENV=production
      - PORT=5678
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/watch_together
      - SESSION_SECRET=a_secure_session_secret_for_production_use_987654321
    networks:
      - default
      - caddy_net
    labels:
      # Catch-all route to Node.JS Express application
      caddy_0: watch.pallabdev.in
      caddy_0.reverse_proxy: "{{upstreams 5678}}"

      # Route WHIP (WebRTC screen sharing ingestion) to MediaMTX WHIP API port
      caddy_1: watch.pallabdev.in
      caddy_1.route: /whip/*
      caddy_1.reverse_proxy: mediamtx:8889

      # Route HLS (viewer stream) requests to MediaMTX HLS playback port
      caddy_2: watch.pallabdev.in
      caddy_2.route: /live/*
      caddy_2.reverse_proxy: mediamtx:8888

networks:
  caddy_net:
    external: true

volumes:
  postgres_data:
